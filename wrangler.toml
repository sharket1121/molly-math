name = "molly-leaderboard"
main = "leaderboard-worker.js"
compatibility_date = "2025-01-01"

# 部署后访问地址: https://molly-leaderboard.<你的子域名>.workers.dev
# 请先在 Cloudflare Dashboard 创建 KV namespace:
#   wrangler kv:namespace create "LEADERBOARD"
# 然后把 ID 填到下面

[[kv_namespaces]]
binding = "LEADERBOARD"
id = "你的KV_NAMESPACE_ID"
